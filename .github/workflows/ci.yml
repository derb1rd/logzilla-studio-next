name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Основной заслон: dependency-free smoke (как у самого продукта — без pip).
      - name: smoke
        run: python3 tests/smoke.py

      # Полный набор на pytest — пока информационно, не блокирует.
      - name: pytest
        continue-on-error: true
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q
